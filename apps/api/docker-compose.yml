services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - '9001:9001'
    environment:
      # --- CONNECTION SETTINGS ---
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # FIXED: Changed 9020 to 9001 to match your 'ports' and 'advertised_listeners'
      - KAFKA_LISTENERS=PLAINTEXT://:9001,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9001
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker:9093
      - KAFKA_CLUSTER_ID=6B065F5C-8D4C-4D9D-9B8A-3E9E9C9F9A9B

      # --- 24-HOUR DELETE SETTINGS ---
      - KAFKA_LOG_RETENTION_MS=86400000
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_LOG_ROLL_MS=43200000
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true

      # --- STABILITY SETTINGS ---
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0

      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  kafka_data:
    driver: local